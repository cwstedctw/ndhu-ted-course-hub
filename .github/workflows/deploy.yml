# NDHU TED Course Hub — GitHub Pages 部署（A9）
#
# 兩條路：
#   1. push 到 main → 驗證 + 建置 + 部署 GitHub Pages
#   2. PR 對 main   → 只跑驗證 + 建置（含輸出掃描），不部署
#
# npm run build 依 package.json 合約＝ validate → next build → scan，
# 所以 CI 只要呼叫 build，內容 schema 驗證與個資／internalNotes 輸出掃描都在裡面。

name: deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # push main：建置 + 部署
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    # 同時間只跑一個部署，避免舊建置蓋掉新版；進行中的不取消（保完整部署）
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 26
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build（validate + next build + scan）
        run: npm run build
        env:
          BASE_PATH: /ndhu-ted-course-hub

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # PR：只驗證＋建置，不部署
  check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 26
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build（validate + next build + scan，不部署）
        run: npm run build
        env:
          BASE_PATH: /ndhu-ted-course-hub
