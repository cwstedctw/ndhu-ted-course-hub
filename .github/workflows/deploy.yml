# NDHU TED Course Hub — GitHub Pages 部署（A9）
#
# 兩條路：
#   1. push 到 main → 驗證 + 建置 + 部署 GitHub Pages
#   2. PR 對 main   → 只跑驗證 + 建置（含輸出掃描），不部署
#
# npm run build 依 package.json 合約＝ validate → decks → next build → scan，
# 所以 CI 只要呼叫 build，內容 schema 驗證、簡報現產（scripts/deck/，發布前才產
# ——2026-07-05 Ted 拍板、產物不進版控）與個資／internalNotes 輸出掃描都在裡面。

name: deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # push main：建置 + 推 gh-pages 分支（Pages 用 legacy 模式吃該分支）
  # 註：workflow 模式（upload-pages-artifact + deploy-pages）在新開站上連三次
  #     秒回 deployment_failed（2026-07-03），改走十年老店的分支模式。
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: github-pages
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 26
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      # 簡報產線（scripts/deck/）：發布前才產 deck，需要 Python＋qrcode（掃碼卡）
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install qrcode（第 19 頁掃碼卡）
        run: pip install qrcode

      - name: Install dependencies
        run: npm ci

      - name: Build（validate + decks + next build + scan）
        run: npm run build
        env:
          BASE_PATH: /ndhu-ted-course-hub

      - name: Push out/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          force_orphan: true

  # PR：只驗證＋建置，不部署
  check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 26
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install qrcode（第 19 頁掃碼卡）
        run: pip install qrcode

      - name: Install dependencies
        run: npm ci

      - name: Build（validate + decks + next build + scan，不部署）
        run: npm run build
        env:
          BASE_PATH: /ndhu-ted-course-hub
